name: CI - Import Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --quiet
    
    - name: Test imports
      run: |
        python -c "import streamlit; print('✓ Streamlit import OK')"
        python -c "import pandas; print('✓ Pandas import OK')"
        python -c "from src.data_processor import DataProcessor; print('✓ DataProcessor import OK')"
        python -c "from src.predictor import DiseasePredictor; print('✓ Predictor import OK')"
        python -c "from src.risk_engine import classify_risk; print('✓ Risk engine import OK')"
        python -c "from src.explainer import ModelExplainer; print('✓ Explainer import OK')"
        echo "✅ All imports successful"
    
    - name: Run tests
      run: |
        python tests/test_risk_engine.py
        python tests/test_data_processor.py
        echo "✅ Tests completed"
